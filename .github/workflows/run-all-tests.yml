name: Aiventra Complete Test Suite & Reports

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Frontend Dependencies
      working-directory: ./frontend
      run: npm install

    - name: Start Frontend Server
      working-directory: ./frontend
      run: |
        npm run dev &
        npx wait-on http://localhost:5173

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install selenium openpyxl webdriver-manager

    - name: Run E2E Selenium Tests
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb
        xvfb-run --auto-servernum python "Vulnerability Test Results/e2e_selenium_tests.py"

    - name: Run Security Test Report Generation
      run: |
        python "Vulnerability Test Results/generate_excel.py"

    - name: Run Appium E2E Tests (Simulation Mode)
      run: |
        python "aiventra-android/appium_tests/appium_e2e_tests.py"

    - name: Run Baseline/Load Testing Report Generation
      run: |
        python "Vulnerability Test Results/run_load_test.py"

    - name: Create Reports ZIP Directory
      run: |
        mkdir -p test-reports
        cp "Vulnerability Test Results/E2E_Test_Results.xlsx" test-reports/
        cp "Vulnerability Test Results/Security_Test_Results.xlsx" test-reports/
        cp "aiventra-android/appium_tests/Appium_Test_Results.xlsx" test-reports/
        cp "Vulnerability Test Results/Load_Testing_Results.xlsx" test-reports/

    - name: Upload Complete Test Reports ZIP
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: Aiventra-Complete-Test-Reports
        path: test-reports/

    - name: Commit and Push Updated Reports to GitHub
      if: always()
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add "Vulnerability Test Results/E2E_Test_Results.xlsx"
        git add "Vulnerability Test Results/Security_Test_Results.xlsx"
        git add "aiventra-android/appium_tests/Appium_Test_Results.xlsx"
        git add "Vulnerability Test Results/Load_Testing_Results.xlsx"
        git commit -m "Auto-update all test report Excel sheets [skip ci]" || echo "No changes to commit"
        git push
